name: 'Build macOS App'

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.2
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          xcodebuild -version

      - name: Set Build & Marketing Version
        run: |
          # Use sed instead of agvtool to avoid project file corruption with objectVersion 77
          BUILD_NUMBER=${{ github.run_number }}
          CURRENT_MARKETING=$(/usr/libexec/PlistBuddy -c "Print :CURRENT_PROJECT_VERSION" Hat.xcodeproj/project.pbxproj 2>/dev/null || echo "1")

          # Update CURRENT_PROJECT_VERSION in pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = ${BUILD_NUMBER}/" Hat.xcodeproj/project.pbxproj

          # Get current marketing version and append build number
          MARKETING_VERSION=$(grep 'MARKETING_VERSION' Hat.xcodeproj/project.pbxproj | head -1 | sed 's/.*= *\(.*\);/\1/' | tr -d ' "')
          NEW_MARKETING="${MARKETING_VERSION}.${BUILD_NUMBER}"
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${NEW_MARKETING}/" Hat.xcodeproj/project.pbxproj

          echo "Build number: ${BUILD_NUMBER}"
          echo "Marketing version: ${NEW_MARKETING}"

      - name: Build Xcode Project
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project "Hat.xcodeproj" \
            -scheme "Hat" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=YES \
            2>&1 | tee build.log

      - name: Show build errors on failure
        if: failure()
        run: |
          echo "=== COMPILATION ERRORS ==="
          grep -A 5 "error:" build.log || true
          echo ""
          echo "=== BUILD FAILED DETAILS ==="
          grep -B 2 -A 10 "BUILD FAILED" build.log || true
          echo ""
          echo "=== LAST 60 LINES ==="
          tail -60 build.log || true

      - name: Package App to ZIP
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd build/Build/Products/Release
          # Remove assinaturas antigas de frameworks embutidos e re-assina tudo (Deep Sign)
          codesign --force --deep --sign - Hat.app
          # Zip the resulting .app bundle so it can be uploaded as an artifact/release
          zip -r Hat-macOS.zip Hat.app

      - name: Generate Sparkle Appcast
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Baixar ferramentas do Sparkle versão 2.9.0 (a mais recente 2.x estável)
          rm -rf jq_sparkle Sparkle-2.9.0.tar.xz
          curl -fL -O https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz
          mkdir -p jq_sparkle && tar -xf Sparkle-2.9.0.tar.xz -C jq_sparkle

          # Criar o diretório final para o release e mover o zip
          mkdir -p release_folder
          mv build/Build/Products/Release/Hat-macOS.zip release_folder/

          # Fazer a assinatura do zip para o Appcast
          printf "%s" "$SPARKLE_PRIVATE_KEY" > eddsa_key
          ./jq_sparkle/bin/generate_appcast --ed-key-file eddsa_key --download-url-prefix "https://github.com/JGSimi/Project-Hat/releases/download/mac-app-v${{ github.run_number }}/" release_folder/
          rm -f eddsa_key Sparkle-2.9.0.tar.xz

      - name: Create or Update Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: mac-app-v${{ github.run_number }}
          name: 'Hat para macOS v${{ github.run_number }}'
          body: 'Release automatizado da versão nativa para macOS (Swift).'
          draft: false
          prerelease: false
          files: |
            release_folder/Hat-macOS.zip
            release_folder/appcast.xml

      - name: Upload Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: Hat-macOS-Package
          path: |
            release_folder/Hat-macOS.zip
            release_folder/appcast.xml

      - name: Prepare Pages Deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p pages_dir
          cp release_folder/appcast.xml pages_dir/

      - name: Deploy Appcast to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages_dir
          publish_branch: gh-pages
          force_orphan: true
